<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Jogos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #101014;
      color: #f4f4f5;
    }

    header {
      padding: 32px 20px;
      text-align: center;
      background: linear-gradient(135deg, #1d1d27, #29293a);
      border-bottom: 1px solid #333346;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    header p {
      margin: 0;
      color: #b9b9c7;
    }

    .container {
      width: min(1200px, 94%);
      margin: 24px auto;
    }

    .filtros {
      display: grid;
      grid-template-columns: repeat(5, minmax(160px, 1fr));
      gap: 12px;
      background: #181820;
      padding: 16px;
      border: 1px solid #2d2d3a;
      border-radius: 14px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    label {
      display: block;
      font-size: 13px;
      color: #c9c9d6;
      margin-bottom: 6px;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #3a3a4a;
      background: #0f0f15;
      color: #fff;
      outline: none;
    }

    button {
      cursor: pointer;
      background: #3d63ff;
      border: none;
      font-weight: bold;
    }

    button:hover {
      filter: brightness(1.1);
    }

    .resumo {
      margin: 18px 4px;
      color: #c9c9d6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 14px;
    }

    .card {
      background: #181820;
      border: 1px solid #2e2e3c;
      border-radius: 14px;
      padding: 16px;
      transition: transform .15s, border-color .15s;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #4c6fff;
    }

    .cardLink {
      display: block;
      color: inherit;
      text-decoration: none;
      width: 100%;
      height: 100%;
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 17px;
      min-height: 42px;
    }

    .preco {
      font-size: 22px;
      font-weight: bold;
      color: #7ee787;
      margin-bottom: 10px;
    }

    .genero {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #262638;
      color: #d7d7e8;
      font-size: 12px;
    }

    .vazio {
      text-align: center;
      padding: 40px;
      color: #aaa;
      border: 1px dashed #444;
      border-radius: 14px;
      grid-column: 1 / -1;
    }

    @media (max-width: 900px) {
      .filtros {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .filtros {
        grid-template-columns: 1fr;
        position: static;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Catálogo de Jogos</h1>
    <p>Filtre por nome, gênero, valor e ordene como quiser.</p>
  </header>

  <main class="container">
    <section class="filtros">
      <div>
        <label for="busca">Buscar por nome</label>
        <input type="text" id="busca" placeholder="Ex: Resident Evil" />
      </div>

      <div>
        <label for="genero">Gênero</label>
        <select id="genero">
          <option value="">Todos</option>
        </select>
      </div>

      <div>
        <label for="valorMax">Valor máximo</label>
        <input type="number" id="valorMax" min="0" step="0.01" placeholder="Ex: 100" />
      </div>

      <div>
        <label for="ordenar">Ordenar por</label>
        <select id="ordenar">
          <option value="az">Nome A-Z</option>
          <option value="za">Nome Z-A</option>
          <option value="menor">Menor valor</option>
          <option value="maior">Maior valor</option>
        </select>
      </div>

      <div>
        <label>&nbsp;</label>
        <button onclick="limparFiltros()">Limpar filtros</button>
      </div>
    </section>

    <p class="resumo" id="resumo"></p>
    <section class="grid" id="lista"></section>
  </main>

    const lista = document.getElementById("lista");
    const resumo = document.getElementById("resumo");
    const busca = document.getElementById("busca");
    const genero = document.getElementById("genero");
    const valorMax = document.getElementById("valorMax");
    const ordenar = document.getElementById("ordenar");

    const generos = [...new Set(jogos.map(jogo => jogo.genero))].sort();
    generos.forEach(item => {
      const option = document.createElement("option");
      option.value = item;
      option.textContent = item;
      genero.appendChild(option);
    });

    function formatarMoeda(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function renderizar() {
      const textoBusca = busca.value.toLowerCase().trim();
      const generoSelecionado = genero.value;
      const maximo = parseFloat(valorMax.value);

      let filtrados = jogos.filter(jogo => {
        const nomeOk = jogo.nome.toLowerCase().includes(textoBusca);
        const generoOk = !generoSelecionado || jogo.genero === generoSelecionado;
        const valorOk = isNaN(maximo) || jogo.valor <= maximo;

        return nomeOk && generoOk && valorOk;
      });

      switch (ordenar.value) {
        case "az":
          filtrados.sort((a, b) => a.nome.localeCompare(b.nome));
          break;
        case "za":
          filtrados.sort((a, b) => b.nome.localeCompare(a.nome));
          break;
        case "menor":
          filtrados.sort((a, b) => a.valor - b.valor);
          break;
        case "maior":
          filtrados.sort((a, b) => b.valor - a.valor);
          break;
      }

      resumo.textContent = `${filtrados.length} jogo(s) encontrado(s) de ${jogos.length} cadastrados.`;

      lista.innerHTML = "";

      if (filtrados.length === 0) {
        lista.innerHTML = '<div class="vazio">Nenhum jogo encontrado com esses filtros.</div>';
        return;
      }

      filtrados.forEach(jogo => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <a href="${jogo.steam}" target="_blank" rel="noopener noreferrer" class="cardLink">
            <h3>${jogo.nome}</h3>
            <div class="preco">${formatarMoeda(jogo.valor)}</div>
            <span class="genero">${jogo.genero}</span>
          </a>
        `;
        lista.appendChild(card);
      });
    }

    function limparFiltros() {
      busca.value = "";
      genero.value = "";
      valorMax.value = "";
      ordenar.value = "az";
      renderizar();
    }

    busca.addEventListener("input", renderizar);
    genero.addEventListener("change", renderizar);
    valorMax.addEventListener("input", renderizar);
    ordenar.addEventListener("change", renderizar);

    renderizar();
  </script>
